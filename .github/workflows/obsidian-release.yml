name: Build Obsidian Vault ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-obsidian-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build vault folder
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          OUT="CER-${VERSION}-Obsidian"
          mkdir -p "dist/${OUT}"
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='dist/' \
            --exclude='.DS_Store' \
            ./ "dist/${OUT}/"
          cd dist
          zip -r "${OUT}.zip" "${OUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CER-Obsidian-Vault
          path: dist/*.zip

      - name: Attach ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
